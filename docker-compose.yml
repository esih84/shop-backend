# استک توسعه‌ی محلی Pet Shop backend
# اجرا:  docker compose up -d
# توقف:  docker compose down        (داده‌ها در volumeها می‌مانند)
services:
  redis:
    # میرور آروان برای دسترسی در ایران؛ در صورت دسترسی مستقیم می‌توانید به redis:7-alpine برگردانید.
    image: docker.arvancloud.ir/redis:7-alpine
    container_name: petshop-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # اگر از قبل Postgres جداگانه‌ای روی پورت 6534 دارید، این سرویس را حذف/کامنت کنید.
  postgres:
    image: docker.arvancloud.ir/postgres:16-alpine
    container_name: petshop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ecommerce_db
    ports:
      - "6534:5432" # هاست:کانتینر — مطابق DB_PORT در .env
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  redis-data:
  postgres-data:
